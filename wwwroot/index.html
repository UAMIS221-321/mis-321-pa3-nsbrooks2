<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrailScout AI | Expert Hiking Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F2F4EF; color: #1B2610; }
        .font-serif { font-family: 'Cormorant+Garamond', serif; }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #D8DECF; border-radius: 10px; }
        .message-bubble p { margin-bottom: 0.5rem; }
        .message-bubble p:last-child { margin-bottom: 0; }
        .message-bubble ul { list-style-type: disc; margin-left: 1.25rem; margin-bottom: 0.5rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .typing-dot { width: 4px; height: 4px; background: #6B8E23; border-radius: 50%; opacity: 0.6; animation: typing 1s infinite ease-in-out; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    </style>
</head>
<body class="h-screen overflow-hidden flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-[#2D3A1A] text-[#F2F4EF] flex flex-col hidden lg:flex shadow-2xl relative z-20">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-10 group cursor-pointer">
                <div class="w-10 h-10 bg-[#6B8E23] rounded-xl flex items-center justify-center group-hover:rotate-12 transition-transform">
                    <i class="fa-solid fa-compass text-white text-xl"></i>
                </div>
                <h1 class="text-xl font-semibold italic font-serif">SummitScout</h1>
            </div>
            <nav class="space-y-2">
                <button onclick="switchTab('explore')" id="btn-explore" class="w-full flex items-center gap-3 bg-[#6B8E23] px-4 py-3 rounded-xl text-white transition-all">
                    <i class="fa-solid fa-mountain-sun opacity-80"></i>
                    <span class="text-sm font-medium">Trail Assistant</span>
                </button>
                <button onclick="switchTab('favorites')" id="btn-favorites" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 opacity-70 transition-all">
                    <i class="fa-solid fa-heart"></i>
                    <span class="text-sm font-medium">Saved Hikes</span>
                </button>
                <button onclick="window.open('https://www.nps.gov/findapark/index.htm', '_blank')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 opacity-70 transition-all">
                    <i class="fa-solid fa-map"></i>
                    <span class="text-sm font-medium">National Parks</span>
                </button>
            </nav>
        </div>
        
        <div class="mt-auto p-6 border-t border-white/10">
            <div class="bg-[#3D4C27] rounded-2xl p-4 border border-white/5">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-bold uppercase tracking-wider opacity-60">Status</span>
                    <div class="flex items-center gap-1.5">
                        <div class="w-1.5 h-1.5 bg-[#86EFAC] rounded-full animate-pulse"></div>
                        <span class="text-[10px] font-bold uppercase tracking-wider text-[#86EFAC]">Operational</span>
                    </div>
                </div>
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[10px] font-medium opacity-70">MySQL DB</span>
                    <span class="text-[10px] opacity-90">Connected</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-medium opacity-70">Gemini AI</span>
                    <span class="text-[10px] opacity-90">Ready</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative border-r border-[#D8DECF] bg-[#F9FAF7]">
        <header class="h-20 border-b border-[#D8DECF] flex items-center justify-between px-8 bg-white/70 backdrop-blur-md z-10">
            <div class="flex items-center gap-4">
                <div class="lg:hidden w-10 h-10 bg-[#2D3A1A] rounded-lg flex items-center justify-center text-white">
                    <i class="fa-solid fa-bars"></i>
                </div>
                <div>
                    <h2 class="font-serif text-2xl font-bold text-[#2D3A1A]">Hiking Expert</h2>
                    <p id="system-status" class="text-[10px] uppercase font-bold tracking-widest text-[#6B8E23]">AI Logic Engaged</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="clearChat()" class="px-5 py-2.5 bg-white border border-[#D8DECF] rounded-full text-[10px] uppercase font-bold tracking-tight hover:border-[#6B8E23] hover:text-[#6B8E23] transition-all shadow-sm">
                    Clear Chat
                </button>
            </div>
        </header>

        <div id="chat-messages" class="flex-1 overflow-y-auto p-8 space-y-10 chat-container">
            <!-- Messages load here -->
        </div>

        <!-- Typing Indicator -->
        <div id="typing-indicator" class="hidden px-8 py-2">
            <div class="flex items-center gap-2 bg-white/80 w-fit px-4 py-2 rounded-full border border-[#E1E6D9]">
                <span class="text-[10px] font-bold uppercase text-[#5D6B4E]">SummitScout is thinking</span>
                <div class="flex gap-1">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="p-8 bg-gradient-to-t from-[#F2F4EF] via-[#F2F4EF] to-transparent">
            <form onsubmit="handleChat(event)" class="max-w-4xl mx-auto">
                <div class="flex items-center gap-4 bg-white p-3 pl-7 rounded-2xl border border-[#D8DECF] shadow-[0_10px_40px_-15px_rgba(45,58,26,0.1)] focus-within:shadow-[0_15px_50px_-15px_rgba(45,58,26,0.15)] transition-all duration-300">
                    <input type="text" id="user-input" autocomplete="off" placeholder="Ask about Yosemite trails, moderate hikes, or safety tips..." class="flex-1 text-sm font-medium outline-none bg-transparent text-[#1B2610] placeholder:text-[#5D6B4E]/50">
                    <button type="submit" id="send-btn" class="w-14 h-12 bg-[#2D3A1A] text-white rounded-xl flex items-center justify-center hover:bg-[#1B2610] hover:scale-105 active:scale-95 transition-all shadow-md">
                        <i class="fa-solid fa-arrow-up text-lg"></i>
                    </button>
                </div>
                <p class="text-[10px] text-center mt-4 text-[#5D6B4E]/60 font-medium">Powered by C# • RAG Knowledge Base • MySQL Persistence</p>
            </form>
        </div>
    </main>

    <!-- Right Panel -->
    <aside class="w-80 bg-white p-8 flex-col overflow-y-auto hidden xl:flex shadow-[-10px_0_30px_rgba(0,0,0,0.02)]">
        <div class="flex items-center justify-between mb-8">
            <h3 id="panel-title" class="font-serif text-xl font-bold text-[#2D3A1A]">Top Trails</h3>
            <div class="w-8 h-8 rounded-full bg-[#F2F4EF] flex items-center justify-center text-[#5D6B4E]">
                <i class="fa-solid fa-sliders-h text-xs"></i>
            </div>
        </div>
        <div id="trail-list" class="space-y-5">
            <!-- Loading Skeletons -->
            <div class="animate-pulse space-y-4">
                <div class="h-24 bg-[#F2F4EF] rounded-2xl w-full"></div>
                <div class="h-24 bg-[#F2F4EF] rounded-2xl w-full"></div>
            </div>
        </div>
    </aside>

    <script>
        let messages = [{ 
            role: 'model', 
            content: "# Welcome to SummitScout!\nI'm your expert guide powered by **C#** and **MySQL**. I can search our database for trails, help you plan your next adventure, and save your favorites.\n\nHow can I help you today?" 
        }];
        let activeTab = 'explore';
        let savedIds = [];
        let isTyping = false;

        function renderMessages() {
            const container = document.getElementById('chat-messages');
            container.innerHTML = messages.map((m, idx) => {
                const isModel = m.role === 'model';
                const htmlContent = marked.parse(m.content);
                
                return `
                    <div class="flex gap-5 ${isModel ? 'justify-start' : 'justify-end'} animate-fade-in" style="animation-delay: ${idx * 0.05}s">
                        ${isModel ? `
                            <div class="w-10 h-10 rounded-xl bg-[#2D3A1A] flex-shrink-0 flex items-center justify-center text-[#F2F4EF] shadow-lg">
                                <i class="fa-solid fa-robot text-sm"></i>
                            </div>
                        ` : ''}
                        <div class="max-w-xl group">
                            <div class="relative ${isModel ? 'bg-white text-[#1B2610] p-6 rounded-3xl rounded-tl-none border border-[#E1E6D9] shadow-sm' : 'bg-[#e0e7d5] text-[#1B2610] p-5 rounded-3xl rounded-tr-none border border-[#6B8E23]/20 shadow-md'} italic-serif">
                                <div class="message-bubble prose prose-sm text-sm leading-relaxed font-medium">
                                    ${htmlContent}
                                </div>
                                <span class="absolute -bottom-6 ${isModel ? 'left-0' : 'right-0'} text-[9px] font-bold uppercase tracking-widest text-[#5D6B4E]/40 opacity-0 group-hover:opacity-100 transition-opacity">
                                    ${isModel ? 'SummitScout' : 'You'} • ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function fetchTrails() {
            try {
                const res = await fetch('/api/trails');
                const data = await res.json();
                renderTrails(data);
            } catch (e) {
                console.error("Fetch trails error", e);
            }
        }

        async function fetchSaved() {
            try {
                const res = await fetch('/api/saved-trails');
                const data = await res.json();
                savedIds = data.savedTrailIds || [];
                if (activeTab === 'favorites') fetchTrails();
            } catch (e) {
                console.error("Fetch saved error", e);
            }
        }

        function renderTrails(trails) {
            const list = document.getElementById('trail-list');
            const filtered = activeTab === 'explore' ? trails : trails.filter(t => savedIds.includes(t.id));
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-10">
                        <i class="fa-solid fa-mountain text-3xl text-[#D8DECF] mb-4"></i>
                        <p class="text-[11px] font-bold uppercase tracking-widest text-[#5D6B4E]">No trails found</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(t => {
                const isSaved = savedIds.includes(t.id);
                return `
                    <div class="group bg-white rounded-2xl p-5 border border-[#E1E6D9] shadow-sm hover:border-[#6B8E23] hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
                        <div class="flex justify-between items-start mb-3">
                            <h4 class="font-bold text-xs text-[#2D3A1A] truncate max-w-[140px]">${t.name}</h4>
                            <span class="text-[8px] bg-[#E4E9DC] px-2 py-1 rounded-full font-black uppercase tracking-tighter text-[#4A5D23] border border-[#6B8E23]/20">${t.difficulty}</span>
                        </div>
                        <div class="flex items-center gap-3 text-[10px] text-[#5D6B4E] mb-4 font-medium">
                            <span class="flex items-center gap-1"><i class="fa-solid fa-route"></i> ${t.distanceMiles}mi</span>
                            <span class="flex items-center gap-1"><i class="fa-solid fa-location-dot"></i> ${t.location.split(',')[0]}</span>
                        </div>
                        <button onclick="saveTrail('${t.id}')" class="w-full py-2.5 ${isSaved ? 'bg-[#6B8E23] text-white' : 'bg-[#F2F4EF] text-[#4A5D23]'} rounded-xl text-[10px] font-bold transition-all flex items-center justify-center gap-2 active:scale-95 shadow-sm">
                            <i class="fa-solid ${isSaved ? 'fa-check' : 'fa-heart'}"></i>
                            ${isSaved ? 'Saved to Hikes' : 'Add to Favorites'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        async function handleChat(e) {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const message = input.value;
            if (!message || isTyping) return;

            messages.push({ role: 'user', content: message });
            renderMessages();
            input.value = '';
            
            setLoading(true);

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message, 
                        history: messages.slice(0, -1).map(m => ({ role: m.role, content: m.content })) 
                    })
                });

                const data = await res.json();
                setLoading(false);

                let content = data.response;
                
                // Process Function Calling
                const jsonMatch = content.match(/\{.*action.*\}/);
                if (jsonMatch) {
                    try {
                        const actionData = JSON.parse(jsonMatch[0]);
                        // Strip the JSON from the visible message
                        content = content.replace(jsonMatch[0], "").trim();
                        
                        if (actionData.action === 'save_trail' && actionData.trail_id) {
                            await saveTrail(actionData.trail_id, false);
                            content += "\n\n _[System: Trail updated in favorites]_";
                        }
                    } catch (e) { console.error("Action error", e); }
                }

                messages.push({ role: 'model', content: content });
                renderMessages();
            } catch (err) {
                setLoading(false);
                messages.push({ role: 'model', content: "⚠️ Sorry, I'm having trouble reaching the mountain peak (API Error). Please try again." });
                renderMessages();
            }
        }

        function setLoading(loading) {
            isTyping = loading;
            document.getElementById('typing-indicator').style.display = loading ? 'block' : 'none';
            document.getElementById('send-btn').disabled = loading;
            document.getElementById('send-btn').style.opacity = loading ? '0.5' : '1';
        }

        async function saveTrail(id, notify = true) {
            try {
                await fetch('/api/save-trail', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ trailId: id })
                });
                await fetchSaved();
                await fetchTrails();
                if (notify) {
                    messages.push({ role: 'model', content: "🌲 **Confirmed**: I've successfully saved that trail to your personal collection!" });
                    renderMessages();
                }
            } catch (e) {
                console.error("Save error", e);
            }
        }

        function switchTab(tab) {
            activeTab = tab;
            const isExplore = tab === 'explore';
            
            document.getElementById('btn-explore').className = isExplore 
                ? 'w-full flex items-center gap-3 bg-[#6B8E23] px-4 py-3 rounded-xl text-white shadow-lg' 
                : 'w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 opacity-70 transition-all';
            
            document.getElementById('btn-favorites').className = !isExplore 
                ? 'w-full flex items-center gap-3 bg-[#6B8E23] px-4 py-3 rounded-xl text-white shadow-lg' 
                : 'w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 opacity-70 transition-all';
            
            document.getElementById('panel-title').innerText = isExplore ? 'Top Trails' : 'Your Collection';
            
            fetchTrails();
        }

        function clearChat() {
            if (confirm("Are you sure you want to clear your conversation?")) {
                messages = [messages[0]];
                renderMessages();
            }
        }

        // Initialize state
        window.onload = () => {
            fetchTrails();
            fetchSaved();
            renderMessages();
        };
    </script>
</body>
</html>
